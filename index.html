        <script>
            let isConfigureOpen = false;
            function updateButtons() {
                const root = document.getElementById("configurations");
                [].forEach.call(root.getElementsByTagName("div"), (d, i)=>{
                    [].forEach.call(d.getElementsByTagName("button"), (b, j) => {
                        if (tempConfig[i] === j) {
                            b.classList.add('checked');
                        } else b.classList.remove("checked");
                    });
                })
            }
            function openConfigure() {
                if (isConfigureOpen) return;
                isConfigureOpen = true;
                updateButtons();
                document.getElementById("applyButton").href = `?flag=${makeFlag()}`;
                document.getElementById("configure").style.display = "flex";
            }
            function closeConfigure() {
                if (!isConfigureOpen) return;
                isConfigureOpen = false;
                document.getElementById("configure").style.display = "none";
            }
            const paramFlag = new URLSearchParams(location.search).get("flag");
            const configs = [["grid",2,0],["exponential",2,0],["repeat",7,0],["statement",2,1],["zeroSecond",2,1],["round3",3,1],["fullScreen",2,0]];
            const tempConfig = [0,0,0,1,1,1,0];
            function configClick(ind, value) {
                tempConfig[ind] = value;
                document.getElementById("applyButton").href = `?flag=${makeFlag()}`;
                console.log(tempConfig, makeFlag());
                updateButtons();
            }
            function makeFlag() {
                let flag = 0;
                for (let i = 0; i < configs.length; i++) {
                    flag = flag * configs[i][1] + tempConfig[i];
                }
                return flag.toString(36);
            }
        </script>

class SceneManager {
	constructor(scenes = []) {
		this.scenes = scenes;
		if (scenes.length)
		{
			this.currentScene = scenes[0];
			this.currentScene.container.visible = true;
		}
	}
	add(scene) {
		if (!this.scenes.length) {
			this.currentScene = scene;
			this.currentScene.container.visible = true;
		}
		scene.num = this.scenes.length;
		this.scenes.push(scene);
	}
	goTo(s, pause) {
		const scene = Number.isInteger(s) ? this.scenes[s] : s;
		this.currentScene.container.visible = false;
		this.currentScene.kill();
		this.currentScene = scene;
		this.currentScene.init();
		if(!pause) this.currentScene.start();
		this.currentScene.container.visible = true;
	}
}

function kmp(st, ta, find) {
	const string = st.toString(), target = ta.toString();
	const length = string.length, targetLength = target.length, limit = length - targetLength;
	const pi = new Array(targetLength + 1).fill(0);
	let i = 1, j = 0, count = 0;
	while (i < targetLength) {
		if (target[i + j] === target[j]) pi[i + ++j] = j;
		else if (j){
			i += j - pi[j]; j = pi[j];
		} else i++;
	}
	i = j = 0;
	while (i <= limit) {
		if (string[i + j] === target[j]) {
			j++;
			if (j === targetLength) {
				if (find) {
					return i + 1;
				}
				count++;
				i += j - pi[j]; j = pi[j];
			}
			} else if (j) {
			i += j - pi[j]; j = pi[j];
		} else i++;
	}
	if (find) {
		return 0;
	}
	return count;
}
function calc_rand_func(a, b) {
	const [ap, bp] = [Number(a), Number(b)];
	if (isNaN(ap) || isNaN(bp)) throw new Error(`Both arguments of the function calc_rand must be Number()-able string in strict mode.(${a} and ${b})`);
	const hasFloat = [a,b].reduce((flag, str) => flag || /^-?\d+\.\d+$/.test(str), false);
	const [from, to] = ap <= bp ? [ap, bp] : [bp, ap];
	if (hasFloat) return Math.random()*(to - from) + from;

}

const state = (()=> {
	let paused = true, timeInterval;
	let elapsed = 0, prevTime;
	const onUnpause = [];
	return {
		lastRefresh:0,
		tillTime: (() => {
			const heap = [];
			let counter = 0;
			function cmp(a, b) { return a[0] < b[0] || (a[0] === b[0] && a[1] < b[1]); };
			return {
				size() { return heap.length; },
				top() { return heap[0][0]; },
				push(time) {
					time ??= 0;
					return new Promise(resolve => {
						const item = [ elapsed + time, counter++, resolve ];
						let i = heap.length, c;
						while((c = i) && cmp(item, heap[i = (i - 1) >>> 1])) heap[c] = heap[i];
						heap[c] = item;
					});
				},
				pop() {
					const o = heap[0], e = heap.pop();
					let i = 0, p;
					while (
					(i = (p = i) << 1 | 1) < heap.length &&
					cmp(heap[i += (i+1 < heap.length && cmp(heap[i+1], heap[i]))], e)
					) heap[p] = heap[i];
					if (heap.length) heap[p] = e;
					o[2]();
				}
			}
		})(),
		started: false,
		set elapsed(value) {
			elapsed = value;

		get elapsed() { return elapsed; },
		waitForUnpause() {
			if (!paused) throw new Error("What are u waiting for");

				onUnpause.push(resolve);
				console.log("onUnpause: ", onUnpause, onUnpause.length);
			});
		},
		set paused(value) {
			const bv = Boolean(value);
			if (bv === paused) return;
			paused = bv;
			if (paused) {
				elapsed += Date.now() - prevTime; // no this.elapsed to prevent tilltime from popping
				clearInterval(timeInterval);

				prevTime = Date.now();
				timeInterval = setInterval(() => {
					const now = Date.now();
					this.elapsed += now - prevTime;
					prevTime = now;
				});//n초 기다리기의 부정확성 고증(?)은 아니고 초시계는 정확히 구현했으니 n초기다리기는 지양하라는 귀차니즘입니ㄷ
			}
